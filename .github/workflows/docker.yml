name: Build Docker Images

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v3

      - name: Build backend
        run: docker build -t backend-test ./Back

      - name: Build frontend
        run: docker build -t frontend-test ./Front