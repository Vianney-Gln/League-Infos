version: "3.9"

services:
  backend:
    build: ../Back
    container_name: spring-app
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: ${DB_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8080:8080"
    restart: always

  frontend:
    build: ../Front
    container_name: angular-app
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always