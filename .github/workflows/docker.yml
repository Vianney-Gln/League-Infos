name: Build Docker Images

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build backend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/league-infos-app-backend:latest ./Back

      - name: Build frontend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/league-infos-app-frontend:latest ./Front

      - name: Push backend
        run: docker push ${{ secrets.DOCKER_USERNAME }}/league-infos-app-backend:latest

      - name: Push frontend
        run: docker push ${{ secrets.DOCKER_USERNAME }}/league-infos-app-frontend:latest